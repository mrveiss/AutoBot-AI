---
# Browser role - Playwright, VNC, and desktop environment

# ============================================================
# Phase 1 CLEAN - remove legacy/wrong-node dirs  (#926 Phase 4)
# ============================================================
- name: "Browser | Include clean tasks"
  ansible.builtin.import_tasks: clean.yml
  tags: ['clean']

# ============================================================
# Per-role service account  (#926 Phase 4)
# ============================================================
- name: "Browser | Create autobot-browser system group"
  ansible.builtin.group:
    name: "{{ browser_group }}"
    system: true
    state: present
  tags: ['browser', 'users']

- name: "Browser | Create per-role service account"
  ansible.builtin.user:
    name: "{{ browser_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    group: "{{ browser_group }}"
    comment: "AutoBot browser-worker service account"
    state: present
  tags: ['browser', 'users']

# ============================================================
# Per-role env at /etc/autobot/  (#926 Phase 4)
# ============================================================
- name: "Browser | Ensure /etc/autobot dir exists"
  ansible.builtin.file:
    path: /etc/autobot
    state: directory
    mode: "0755"
    owner: root
    group: root
  tags: ['browser', 'config']

- name: "Browser | Deploy /etc/autobot/autobot-browser-worker.env"
  ansible.builtin.template:
    src: autobot-browser-worker.env.j2
    dest: /etc/autobot/autobot-browser-worker.env
    mode: "0640"
    owner: root
    group: "{{ browser_group }}"
  tags: ['browser', 'config']

# ============================================================
# VNC + desktop environment (opt-in, default false)  (#1363)
# ============================================================
- name: "Browser | Install desktop environment and VNC"
  apt:
    name:
      - xfce4
      - xfce4-goodies
      - tightvncserver
      - dbus-x11
      - x11vnc
      - xvfb
    state: present
  become: yes
  when: install_vnc | default(false)
  tags: ['browser', 'packages', 'vnc']

# ============================================================
# Playwright headless browser automation
# ============================================================
- name: "Browser | Check if Node.js is already installed"
  command: node --version
  register: node_check
  failed_when: false
  changed_when: false
  become: yes
  tags: ['browser', 'packages']

- name: "Browser | Install Node.js from NodeSource"
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    apt-get install -y nodejs
  args:
    creates: /usr/bin/node
  when: node_check.rc != 0
  become: yes
  tags: ['browser', 'packages']

- name: "Browser | Install Playwright system dependencies"
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - libnss3
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libcups2
      - libdrm2
      - libxkbcommon0
      - libxcomposite1
      - libxdamage1
      - libxfixes3
      - libxrandr2
      - libgbm1
      - libasound2
    state: present
  become: yes
  tags: ['browser', 'packages']

- name: "Browser | Install Playwright and FastAPI dependencies via pip"
  pip:
    name:
      - playwright
      - playwright-stealth
      - uvicorn
      - fastapi
    state: present
    executable: pip3
  become: yes
  tags: ['browser', 'packages']

- name: "Browser | Install Playwright browsers"
  command: playwright install chromium firefox
  become: yes
  changed_when: false
  tags: ['browser', 'packages']

- name: "Browser | Install Node.js dependencies for browser worker"
  npm:
    path: /opt/autobot/autobot-browser-worker
    state: present
  become: yes
  when: "'autobot-browser-worker' is exists"
  failed_when: false
  tags: ['browser', 'packages']

- name: "Browser | Create VNC directory"
  file:
    path: /home/autobot/.vnc
    state: directory
    owner: autobot
    group: autobot
    mode: '0700'
  become: yes
  when: install_vnc | default(false)
  tags: ['browser', 'directories', 'vnc']

- name: "Browser | Check if VNC secrets file exists"
  stat:
    path: /etc/autobot/vnc-secrets.env
  register: browser_vnc_secrets_stat
  become: yes
  when: install_vnc | default(false)
  tags: ['browser', 'vnc']

- name: "Browser | Generate secure VNC password"
  shell: |
    password=$(openssl rand -base64 12 | tr -dc 'a-zA-Z0-9' | head -c 16)
    echo "VNC_PASSWORD=${password}" > /etc/autobot/vnc-secrets.env
    chmod 0640 /etc/autobot/vnc-secrets.env
    chown root:autobot /etc/autobot/vnc-secrets.env
  args:
    creates: /etc/autobot/vnc-secrets.env
  become: yes
  when:
    - install_vnc | default(false)
    - not (browser_vnc_secrets_stat.stat.exists | default(false))
  tags: ['browser', 'vnc']

- name: "Browser | Read VNC password"
  shell: >
    grep '^VNC_PASSWORD=' /etc/autobot/vnc-secrets.env
    | cut -d= -f2
  register: browser_vnc_password
  changed_when: false
  become: yes
  when: install_vnc | default(false)
  tags: ['browser', 'vnc']

- name: "Browser | Set VNC password file"
  shell: |
    echo '{{ browser_vnc_password.stdout }}' | vncpasswd -f \
      > /home/autobot/.vnc/passwd
    chmod 0600 /home/autobot/.vnc/passwd
    chown autobot:autobot /home/autobot/.vnc/passwd
  become: yes
  when:
    - install_vnc | default(false)
    - browser_vnc_password.stdout | default('') | length > 0
  tags: ['browser', 'vnc']

- name: "Browser | Create VNC systemd service"
  template:
    src: vnc.service.j2
    dest: /etc/systemd/system/autobot-vnc.service
    mode: '0644'
  become: yes
  when: install_vnc | default(false)
  notify:
    - reload systemd
    - restart vnc
  tags: ['browser', 'systemd', 'vnc']

- name: "Browser | Create Playwright systemd service"
  template:
    src: playwright.service.j2
    dest: /etc/systemd/system/autobot-playwright.service
    mode: '0644'
  become: yes
  notify:
    - reload systemd
    - restart playwright
  tags: ['browser', 'systemd']

- name: "Browser | Configure firewall - Allow VNC"
  ufw:
    rule: allow
    port: "{{ vnc_port }}"
    proto: tcp
    from_ip: "{{ network_subnet }}"
    comment: "VNC Server"
  become: yes
  when: install_vnc | default(false)
  notify: reload firewall
  tags: ['browser', 'firewall', 'vnc']

- name: "Browser | Configure firewall - Allow Playwright API"
  ufw:
    rule: allow
    port: "{{ playwright_port }}"
    proto: tcp
    from_ip: "{{ network_subnet }}"
    comment: "Playwright API"
  become: yes
  notify: reload firewall
  tags: ['browser', 'firewall']

- name: "Browser | Enable VNC service"
  systemd:
    name: autobot-vnc
    enabled: yes
    daemon_reload: yes
  become: yes
  when: install_vnc | default(false)
  tags: ['browser', 'service', 'vnc']

- name: "Browser | Enable Playwright service"
  systemd:
    name: autobot-playwright
    enabled: yes
    daemon_reload: yes
  become: yes
  tags: ['browser', 'service']

- name: "Browser | Display configuration summary"
  debug:
    msg:
      - "=== Browser Configuration Complete ==="
      - "Playwright Port: {{ playwright_port }}"
      - "Browsers: Chromium, Firefox"
      - "VNC Installed: {{ install_vnc | default(false) }}"
      - "Services: autobot-playwright{{ ' + autobot-vnc' if (install_vnc | default(false)) else '' }}"
      - "Note: Services will start when code is synced"
  tags: ['browser', 'report']
